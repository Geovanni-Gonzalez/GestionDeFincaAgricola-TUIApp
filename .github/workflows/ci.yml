name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Cabal build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.2"
          cabal-version: "3.12.1.0"

      - name: Build
        run: |
          cabal update
          cabal build all
